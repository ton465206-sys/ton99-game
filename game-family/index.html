<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f9bb4">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<title>Family Photo Puzzle</title>
<style>
:root{--ink:#17343b;--muted:#557078;--paper:#fffdf7;--panel:rgba(255,253,247,.96);--line:rgba(23,52,59,.16);--aqua:#1f9bb4;--leaf:#58aa52;--berry:#df4d68;--sun:#f4b63d;--shadow:0 14px 34px rgba(33,72,84,.18)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100svh;color:var(--ink);font-family:"Trebuchet MS","Segoe UI",Arial,sans-serif;background:linear-gradient(145deg,#d6f6ff,#fff3ba 50%,#e4f8d8);user-select:none}button,input{font:inherit}button{min-height:46px;border:2px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font-weight:900;box-shadow:0 4px 0 rgba(23,52,59,.15)}button:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(23,52,59,.15)}.app{width:min(1180px,100%);min-height:100svh;margin:auto;padding:max(12px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));display:grid;gap:10px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:0;font-size:clamp(2rem,8vw,4rem);line-height:.92;color:#125467}.top p{margin:4px 0 0;color:var(--muted);font-weight:900}.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.stats div,.side,.controls label,.strip{border:2px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow)}.stats div{min-height:58px;text-align:center;padding:8px 6px}.stats span,.side span,.controls span{display:block;color:var(--muted);font-size:.72rem;font-weight:900;text-transform:uppercase}.stats strong{display:block;margin-top:3px;font-size:clamp(1rem,3.5vw,1.35rem)}.play{display:grid;grid-template-columns:minmax(0,1fr) 230px;gap:12px;align-items:start}.board-wrap{position:relative;display:grid;place-items:center}.board{display:block;width:min(94vw,67svh,760px);height:min(94vw,67svh,760px);border:4px solid rgba(23,52,59,.26);border-radius:8px;background:#fff;box-shadow:var(--shadow);touch-action:none}.pause-cover{position:absolute;inset:18px;display:none;place-items:center;border-radius:8px;background:rgba(255,255,255,.84);font-size:2rem;font-weight:900;color:#125467}.win{position:absolute;left:18px;right:18px;bottom:18px;padding:14px;border:2px solid var(--line);border-radius:8px;background:rgba(255,255,255,.97);box-shadow:var(--shadow);text-align:center}.win[hidden]{display:none}.win h2{margin:0}.win p{font-weight:800}.win button{width:100%;background:var(--leaf);color:#fff}.side{padding:10px}.preview{display:block;width:100%;height:auto;border:3px solid var(--line);border-radius:8px;background:#fff}.gallery{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px}.thumb{aspect-ratio:1;border:3px solid transparent;border-radius:8px;background-size:cover;background-position:center}.thumb.active{border-color:var(--berry)}.controls{display:grid;grid-template-columns:52px minmax(0,1fr) 52px;gap:8px;align-items:center}.controls button{font-size:2rem}.controls label{padding:7px 12px;min-height:58px}#level{width:100%;accent-color:var(--berry)}.actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:8px}.strip{padding:10px}.strip ol{margin:8px 0 0;padding-left:24px;font-weight:800}.note{text-align:center;margin:0;color:var(--muted);font-weight:800}@media(max-width:800px){.play{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.side{display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:start}.side canvas{grid-column:1;grid-row:1/span 4}.gallery{grid-column:2;grid-template-columns:repeat(5,1fr)}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><h1>Family Photo Puzzle</h1><p>Real photo jigsaw mode</p></div><button id="sound" type="button">Sound</button></header>
<section class="stats"><div><span>Photo</span><strong id="photoText">1 / 5</strong></div><div><span>Pieces</span><strong id="pieceText">3 x 3</strong></div><div><span>Time</span><strong id="timeText">0s</strong></div><div><span>Moves</span><strong id="moveText">0</strong></div><div><span>Score</span><strong id="scoreText">1000</strong></div></section>
<section class="play"><section class="board-wrap"><canvas id="board" class="board" width="760" height="760"></canvas><div id="pauseCover" class="pause-cover">Paused</div><div id="win" class="win" hidden><h2>Photo Complete</h2><p id="winText">Good puzzle work.</p><button id="nextBtn" type="button">Next Photo</button></div></section><aside class="side"><span>Finished picture</span><strong id="photoName">Family Photo 1</strong><canvas id="preview" class="preview" width="240" height="240"></canvas><div id="gallery" class="gallery"></div></aside></section>
<section class="controls"><button id="prevLevel" type="button">&lt;</button><label><span>Level</span><input id="level" type="range" min="1" max="100" value="1"></label><button id="nextLevel" type="button">&gt;</button></section>
<p class="note">Tap two pieces, or drag one piece onto another. Use Pause Time when a child needs a break.</p>
<section class="strip"><strong>Best Scores</strong><ol id="bestList"><li>No scores yet</li></ol></section>
<footer class="actions"><button id="hint" type="button">Hint</button><button id="pause" type="button">Pause Time</button><button id="shuffle" type="button">Shuffle</button><button id="easy" type="button">Easy View</button></footer>
</main>
<script>
const photos=['../assets/family/photo-1.jpg','../assets/family/photo-2.jpg','../assets/family/photo-3.jpg','../assets/family/photo-4.jpg','../assets/family/photo-5.jpg'];
const names=['Mountain Dress','Home Smile','Travel View','Pink Dress','Family Sofa'];
const board=document.getElementById('board'),ctx=board.getContext('2d'),preview=document.getElementById('preview'),pctx=preview.getContext('2d'),imgCanvas=document.createElement('canvas'),ictx=imgCanvas.getContext('2d');imgCanvas.width=760;imgCanvas.height=760;
let level=1,photo=0,grid=3,pieces=[],selected=-1,moves=0,start=Date.now(),elapsed=0,totalPaused=0,paused=false,pauseStart=0,solved=false,hintUntil=0,easy=false,sound=true,dragStart=-1,dragMoved=false;const loaded=[];
function gridFor(l){return l<16?3:l<38?4:l<62?5:l<84?6:7}function score(){return Math.max(50,Math.round(1000-elapsed*5-moves*15+grid*grid*8))}function beep(f){if(!sound)return;try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=f||660;g.gain.value=.035;o.start();o.stop(ac.currentTime+.08)}catch(e){}}
function drawCover(img,c,size){c.clearRect(0,0,size,size);c.fillStyle='#fff';c.fillRect(0,0,size,size);const s=Math.max(size/img.width,size/img.height),w=img.width*s,h=img.height*s,x=(size-w)/2,y=(size-h)/2;c.drawImage(img,x,y,w,h)}
async function loadImages(){for(const src of photos){const im=new Image();im.src=src;await im.decode();loaded.push(im)}}function setup(l=level,p=photo){level=Math.max(1,Math.min(100,l));photo=(p+photos.length)%photos.length;grid=gridFor(level);moves=0;elapsed=0;totalPaused=0;paused=false;pauseStart=0;solved=false;selected=-1;hintUntil=Date.now()+1600;start=Date.now();drawCover(loaded[photo],ictx,760);drawCover(loaded[photo],pctx,240);pieces=Array.from({length:grid*grid},(_,i)=>i);shuffle();ui();renderGallery();document.getElementById('win').hidden=true;document.getElementById('pause').textContent='Pause Time'}function shuffle(){for(let i=pieces.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pieces[i],pieces[j]]=[pieces[j],pieces[i]]}if(pieces.every((p,i)=>p===i))[pieces[0],pieces[1]]=[pieces[1],pieces[0]]}function ui(){document.getElementById('photoText').textContent=(photo+1)+' / '+photos.length;document.getElementById('photoName').textContent=names[photo];document.getElementById('pieceText').textContent=grid+' x '+grid;document.getElementById('timeText').textContent=elapsed+'s';document.getElementById('moveText').textContent=moves;document.getElementById('scoreText').textContent=score();document.getElementById('level').value=level}
function renderGallery(){const g=document.getElementById('gallery');g.innerHTML='';photos.forEach((src,i)=>{const b=document.createElement('button');b.className='thumb'+(i===photo?' active':'');b.style.backgroundImage='url('+src+')';b.title=names[i];b.onclick=()=>setup(level,i);g.appendChild(b)})}function pos(e){const r=board.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*board.width,y=(e.clientY-r.top)/r.height*board.height;return Math.floor(x/(board.width/grid))+Math.floor(y/(board.height/grid))*grid}function choose(p){if(paused||solved||p<0||p>=pieces.length)return;if(selected<0){selected=p;beep(520);return}if(selected===p){selected=-1;return}[pieces[selected],pieces[p]]=[pieces[p],pieces[selected]];selected=-1;moves++;ui();beep(660);checkWin()}function checkWin(){if(!pieces.every((p,i)=>p===i))return;solved=true;document.getElementById('winText').textContent='Score '+score()+' · Time '+elapsed+'s · Moves '+moves;document.getElementById('win').hidden=false;saveBest();beep(880)}
function saveBest(){const key='familyPhotoScores',rows=JSON.parse(localStorage.getItem(key)||'[]');rows.push({name:names[photo],score:score(),time:elapsed,moves});rows.sort((a,b)=>b.score-a.score||a.time-b.time);localStorage.setItem(key,JSON.stringify(rows.slice(0,5)));renderBest()}function renderBest(){const rows=JSON.parse(localStorage.getItem('familyPhotoScores')||'[]');document.getElementById('bestList').innerHTML=rows.length?rows.map(r=>'<li>'+r.name+' - '+r.score+' pts · '+r.time+'s</li>').join(''):'<li>No scores yet</li>'}
function draw(){if(!solved&&!paused){elapsed=Math.floor((Date.now()-start-totalPaused)/1000);ui()}const size=board.width,t=size/grid;ctx.clearRect(0,0,size,size);if(Date.now()<hintUntil||easy){ctx.drawImage(imgCanvas,0,0,size,size);ctx.fillStyle=easy?'rgba(255,253,247,.45)':'rgba(255,253,247,.72)';ctx.fillRect(0,0,size,size)}for(let p=0;p<pieces.length;p++){const src=pieces[p],sx=src%grid*t,sy=Math.floor(src/grid)*t,dx=p%grid*t,dy=Math.floor(p/grid)*t;ctx.drawImage(imgCanvas,sx,sy,t,t,dx,dy,t,t);ctx.strokeStyle=p===selected?'#df4d68':'rgba(255,255,255,.92)';ctx.lineWidth=p===selected?8:3;ctx.strokeRect(dx+1,dy+1,t-2,t-2);if(p!==src&&!solved){ctx.fillStyle='rgba(23,52,59,.08)';ctx.fillRect(dx+2,dy+2,t-4,t-4)}}if(solved)ctx.drawImage(imgCanvas,0,0,size,size);document.getElementById('pauseCover').style.display=paused?'grid':'none';requestAnimationFrame(draw)}
board.addEventListener('pointerdown',e=>{if(paused||solved)return;board.setPointerCapture&&board.setPointerCapture(e.pointerId);dragStart=pos(e);dragMoved=false;e.preventDefault()});board.addEventListener('pointermove',e=>{if(dragStart>=0)dragMoved=true;e.preventDefault()});board.addEventListener('pointerup',e=>{const p=pos(e);if(dragStart>=0&&dragMoved&&p!==dragStart){selected=dragStart;choose(p)}else choose(p);dragStart=-1;dragMoved=false;e.preventDefault()});board.addEventListener('pointercancel',()=>{dragStart=-1;dragMoved=false});
document.getElementById('hint').onclick=()=>{if(!paused)hintUntil=Date.now()+2400};document.getElementById('pause').onclick=function(){paused=!paused;if(paused){pauseStart=Date.now();this.textContent='Resume Time'}else{totalPaused+=Date.now()-pauseStart;this.textContent='Pause Time'}};document.getElementById('shuffle').onclick=()=>setup(level,photo);document.getElementById('easy').onclick=function(){easy=!easy;this.textContent=easy?'Hide Lines':'Easy View'};document.getElementById('prevLevel').onclick=()=>setup(level-1,photo);document.getElementById('nextLevel').onclick=()=>setup(level+1,photo);document.getElementById('level').oninput=e=>setup(Number(e.target.value),photo);document.getElementById('nextBtn').onclick=()=>setup(level,(photo+1)%photos.length);document.getElementById('sound').onclick=function(){sound=!sound;this.textContent=sound?'Sound':'Muted'};
loadImages().then(()=>{setup(1,0);renderBest();draw()});
</script>
</body>
</html>
